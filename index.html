<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE PONDERING MACHINE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700&family=Fira+Code:wght@400;500&display=swap');
        
        body { background-color: #050505; color: #e0e0e0; font-family: 'Inter', sans-serif; overflow: hidden; }
        canvas { position: absolute; top: 0; left: 0; z-index: 0; cursor: pointer; }
        .glass { background: rgba(15, 15, 20, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.8); }
        .thought-stream { font-family: 'Fira Code', monospace; scrollbar-width: none; -ms-overflow-style: none; }
        .thought-stream::-webkit-scrollbar { display: none; }
        .glow-text { text-shadow: 0 0 10px rgba(88, 101, 242, 0.5); }
        
        #main-menu-overlay { 
            backdrop-filter: blur(20px); 
            background: radial-gradient(circle at center, rgba(15,15,20,0.8) 0%, rgba(5,5,5,0.95) 100%); 
        }

        ::selection {
            background: rgba(79, 70, 229, 0.4);
            color: white;
        }
    </style>
</head>
<body class="h-screen w-screen flex flex-col items-center justify-center">

    <canvas id="orbCanvas"></canvas>

    <!-- Main Menu Overlay -->
    <div id="main-menu-overlay" class="absolute inset-0 z-[100] flex flex-col items-center justify-center transition-opacity duration-1000">
        <div class="text-center mb-12">
            <h1 class="text-5xl font-bold tracking-[0.5em] text-white mb-2 glow-text italic">THE PONDERING</h1>
            <h1 class="text-5xl font-bold tracking-[0.5em] text-indigo-500 glow-text italic">MACHINE</h1>
        </div>
        
        <div class="flex flex-col gap-4 w-72">
            <button onclick="startGame()" class="glass hover:bg-white/10 text-white px-8 py-4 rounded-xl font-bold tracking-[0.2em] transition-all hover:scale-105 border border-white/20 uppercase">Enter the Void</button>
            <button onclick="linkAccount()" id="link-btn-main" class="glass hover:bg-indigo-500/20 text-indigo-300 px-8 py-4 rounded-xl font-bold tracking-[0.1em] transition-all hover:scale-105 border border-indigo-500/30 flex items-center justify-center gap-2 italic uppercase">
                Link Pollinations
            </button>
        </div>
        
        <div id="auth-status-menu" class="absolute bottom-10 text-[10px] tracking-[0.3em] text-white/30 uppercase italic">status: connecting to system...</div>
    </div>

    <!-- Linked State Indicator -->
    <div id="link-menu" class="absolute top-6 right-6 z-50 flex items-center gap-3 cursor-pointer group" onclick="linkAccount()">
        <span id="link-label" class="text-[10px] uppercase tracking-[0.2em] text-indigo-400 opacity-0 group-hover:opacity-100 transition-opacity duration-300">link account</span>
        <div id="link-circle" class="w-12 h-12 rounded-full border border-white/20 flex items-center justify-center bg-black/50 backdrop-blur-md transition-all group-hover:border-indigo-500/50 group-hover:bg-indigo-500/10">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-white/70 group-hover:text-white">
                <circle cx="12" cy="12" r="1"/><circle cx="19" cy="12" r="1"/><circle cx="5" cy="12" r="1"/>
            </svg>
        </div>
    </div>

    <!-- Primary App Interface -->
    <div id="app-ui" class="relative z-10 w-full max-w-2xl px-6 transition-opacity duration-1000 opacity-0 pointer-events-none">
        <div class="flex flex-col gap-6">
            
            <div id="terminal-container" class="glass rounded-2xl p-6 h-48 flex flex-col opacity-0 transition-all duration-700 translate-y-4">
                <div class="flex items-center gap-2 mb-3 border-b border-white/10 pb-2">
                    <div class="w-2.5 h-2.5 rounded-full bg-red-500/40"></div>
                    <div class="w-2.5 h-2.5 rounded-full bg-yellow-500/40"></div>
                    <div class="w-2.5 h-2.5 rounded-full bg-green-500/40"></div>
                    <span class="text-[10px] uppercase tracking-[0.2em] text-white/40 ml-2 italic">monologue stream</span>
                </div>
                <div id="thought-stream" class="thought-stream overflow-y-auto text-xs text-cyan-400/70 space-y-1"></div>
            </div>

            <div class="glass rounded-2xl p-4 flex gap-3 shadow-2xl">
                <select id="model-select" class="bg-black/50 border border-white/10 rounded-xl px-4 py-3 outline-none text-white/80 cursor-pointer w-40 text-xs font-mono uppercase tracking-wider appearance-none">
                    <option value="openai">openai</option>
                </select>
                <input type="text" id="user-input" placeholder="ponder something..." class="bg-white/5 border border-white/10 rounded-xl px-4 py-3 w-full outline-none text-white italic text-sm placeholder:text-white/20">
                <button onclick="initiateFlow()" id="flow-btn" class="bg-indigo-600 hover:bg-indigo-500 text-white px-8 py-3 rounded-xl font-bold italic tracking-widest text-sm transition-all active:scale-95">FLOW</button>
            </div>

            <div id="epiphany-box" class="glass rounded-2xl p-8 opacity-0 transition-all duration-1000 translate-y-4 text-center relative">
                <h2 class="text-[10px] uppercase tracking-[0.4em] text-indigo-400 mb-6 font-bold italic">the realization</h2>
                <p id="final-answer" class="text-2xl font-light leading-relaxed text-white glow-text italic"></p>
                <div id="cost-display" class="absolute bottom-3 right-5 text-[9px] text-white/20 font-mono uppercase italic tracking-tighter"></div>
            </div>
            
            <div id="history-box" class="glass rounded-2xl p-4 shadow-xl max-h-48 overflow-y-auto thought-stream opacity-0 transition-opacity duration-700">
                <div class="text-[10px] uppercase tracking-[0.2em] text-white/40 mb-3 border-b border-white/10 pb-2 flex justify-between italic">
                    <span>community ponders</span>
                    <span id="user-count" class="text-indigo-400 italic">syncing stream...</span>
                </div>
                <div id="history-list" class="space-y-4 text-xs text-white/60"></div>
            </div>
        </div>
    </div>

    <script type="module">
        import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';

        // supabase config
        const supabaseUrl = 'https://ohlsmhavvbymhrgzcfax.supabase.co'; 
        const supabaseKey = 'sb_publishable_vAzh7H5fQMrbaHWiAkuxVg_BTg0miw1';
        const supabase = createClient(supabaseUrl, supabaseKey);

        let apiKey = localStorage.getItem('pollinations_key') || '';
        let state = 'idle';
        let intensity = 0;

        window.startGame = () => {
            document.getElementById('main-menu-overlay').classList.add('opacity-0', 'pointer-events-none');
            document.getElementById('app-ui').classList.remove('opacity-0', 'pointer-events-none');
            setTimeout(() => document.getElementById('history-box').classList.remove('opacity-0'), 1000);
        };

        window.linkAccount = () => {
            const redirectUri = encodeURIComponent(window.location.href.split('#')[0]);
            const clientId = 'pk_mFJA3tgXjocl8Eb7';
            window.location.href = `https://enter.pollinations.ai/authorize?redirect_uri=${redirectUri}&client_id=${clientId}`;
        };

        const fetchPonders = async () => {
            try {
                const { data, error } = await supabase
                    .from('ponders')
                    .select('*')
                    .order('created_at', { ascending: false })
                    .limit(10);
                
                if (error) throw error;
                
                const list = document.getElementById('history-list');
                list.innerHTML = data.map(p => `
                    <div class="bg-black/30 p-4 rounded-xl border border-white/5 transition-all hover:border-indigo-500/20 italic">
                        <div class="flex justify-between items-center mb-1">
                            <span class="text-indigo-400 font-bold text-[9px] uppercase tracking-[0.1em]">${p.topic}</span>
                            <span class="text-white/10 text-[8px] font-mono uppercase">${p.model || 'unknown'}</span>
                        </div>
                        <p class="text-white/80 mt-2 leading-relaxed">"${p.answer}"</p>
                    </div>
                `).join('');
                document.getElementById('user-count').innerText = 'live stream active';
            } catch (e) {
                document.getElementById('user-count').innerText = 'stream offline';
            }
        };

        const savePonder = async (topic, answer, model) => {
            try {
                await supabase.from('ponders').insert([{ topic, answer, model }]);
                fetchPonders();
            } catch (e) {
                console.error('save failed:', e);
            }
        };

        window.initiateFlow = async () => {
            if (!apiKey) return alert('link account first');
            
            const topicInput = document.getElementById('user-input');
            const topic = topicInput.value.trim() || "the architecture of coincidence";
            const model = document.getElementById('model-select').value;
            const stream = document.getElementById('thought-stream');
            const term = document.getElementById('terminal-container');
            const epiphany = document.getElementById('epiphany-box');
            
            if (state === 'thinking') return;
            
            state = 'thinking';
            document.getElementById('flow-btn').disabled = true;
            document.getElementById('flow-btn').innerText = "...";
            term.classList.remove('opacity-0');
            epiphany.classList.add('opacity-0');
            stream.innerHTML = '<div class="text-indigo-400/50 italic">> CONNECTING TO NEURAL MESH...</div>';
            intensity = 0.3;

            try {
                const prompt = `Act as an AI lost in deep thought about "${topic}". Write a sequence of 12 short internal realizations. Format: each thought on its own line. No preamble. The very last line must be a single profound answer to the topic.`;
                
                const res = await fetch('https://gen.pollinations.ai/v1/chat/completions', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${apiKey}` },
                    body: JSON.stringify({ 
                        model, 
                        messages: [{ role: 'user', content: prompt }] 
                    })
                });
                
                if (!res.ok) throw new Error('API flow interrupted');
                
                const data = await res.json();
                const text = data.choices[0].message.content;
                const lines = text.split('\n').filter(l => l.trim().length > 0);
                
                if (data.usage) {
                    document.getElementById('cost-display').innerText = `${data.usage.total_tokens} units processed`;
                }

                for (let i = 0; i < lines.length - 1; i++) {
                    await new Promise(r => setTimeout(r, 400));
                    const d = document.createElement('div');
                    d.className = "opacity-0 transition-opacity duration-300";
                    d.innerText = `> ${lines[i]}`;
                    stream.appendChild(d);
                    setTimeout(() => d.classList.remove('opacity-0'), 50);
                    stream.scrollTop = stream.scrollHeight;
                    intensity = (i / lines.length);
                }

                await new Promise(r => setTimeout(r, 800));
                const finalAnswer = lines[lines.length - 1];
                document.getElementById('final-answer').innerText = finalAnswer;
                epiphany.classList.remove('opacity-0', 'translate-y-4');
                
                state = 'epiphany';
                intensity = 1.0;

                savePonder(topic, finalAnswer, model);

            } catch (e) { 
                stream.innerHTML += '<div class="text-red-500">> ERROR: COGNITIVE FLOW BLOCKED.</div>'; 
            } finally { 
                state = 'idle'; 
                document.getElementById('flow-btn').disabled = false;
                document.getElementById('flow-btn').innerText = "FLOW";
                setTimeout(() => { intensity = 0; }, 3000);
            }
        };

        const canvas = document.getElementById('orbCanvas');
        const ctx = canvas.getContext('2d');
        let w, h;
        const resize = () => { w = canvas.width = window.innerWidth; h = canvas.height = window.innerHeight; };
        window.addEventListener('resize', resize); 
        resize();

        const animate = () => {
            ctx.fillStyle = 'rgba(5, 5, 5, 0.15)'; 
            ctx.fillRect(0, 0, w, h);
            const g = ctx.createRadialGradient(w/2, h/2, 0, w/2, h/2, 180 + intensity * 150);
            const colorBase = state === 'thinking' ? '100, 150, 255' : '88, 101, 242';
            g.addColorStop(0, `rgba(${colorBase}, ${0.15 + intensity * 0.3})`);
            g.addColorStop(1, 'transparent');
            ctx.fillStyle = g; 
            ctx.beginPath(); 
            ctx.arc(w/2, h/2, 350 + intensity * 100, 0, Math.PI*2); 
            ctx.fill();
            requestAnimationFrame(animate);
        };

        window.addEventListener('load', async () => {
            const hash = new URLSearchParams(window.location.hash.slice(1));
            const urlKey = hash.get('api_key');
            if (urlKey) {
                apiKey = urlKey;
                localStorage.setItem('pollinations_key', apiKey);
                window.history.replaceState(null, null, window.location.pathname);
            }
            
            if (apiKey) {
                document.getElementById('auth-status-menu').innerText = 'status: neural link active';
                document.getElementById('auth-status-menu').classList.replace('text-white/30', 'text-green-500/50');
                document.getElementById('link-circle').classList.add('border-green-500/50', 'text-green-400');
                document.getElementById('link-btn-main').innerText = 'Pollen Available';
                document.getElementById('link-btn-main').classList.add('border-green-400/20', 'text-green-400');
            }
            
            try {
                const mRes = await fetch('https://gen.pollinations.ai/text/models');
                const mData = await mRes.json();
                const list = Array.isArray(mData) ? mData : mData.data;
                document.getElementById('model-select').innerHTML = list.map(m => `
                    <option value="${m.id || m}">${m.id || m}</option>
                `).join('');
            } catch (e) {}
            
            animate();
            fetchPonders();
            
            supabase
                .channel('public:ponders')
                .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'ponders' }, fetchPonders)
                .subscribe();
        });
    </script>
</body>
</html>
